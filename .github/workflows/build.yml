name: Build Adreno GPU Driver Module

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'src/ged.c'
      - 'Android.mk'
      - 'Application.mk'
      - 'module/**'
      - 'post-fs-data.sh'
      - 'service.sh'
      - 'boot-completed.sh'
      - 'uninstall.sh'
      - 'common.sh'
      - 'customize.sh'
      - 'system.prop'
      - 'sepolicy.rule'
      - 'module.prop'
      - 'adreno_config.txt'
      - 'qgl_config.txt'
      - 'game_exclusion_list.sh'

# Only one concurrent build at a time
concurrency:
  group: build
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Build system_monitor.apk (Java companion daemon)
  # Mirrors the SystemMonitor repo's own build.yml exactly, but we do it
  # here so the APK version is always pinned to what we build.
  # ──────────────────────────────────────────────────────────────────────
  build-sysmon:
    name: Build system_monitor.apk
    runs-on: ubuntu-latest
    outputs:
      apk-path: ${{ steps.find-apk.outputs.apk_path }}

    steps:
      - name: Checkout SystemMonitor source
        uses: actions/checkout@v4
        with:
          repository: rem01gaming/systemmonitor
          ref: master
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build a debug (unsigned) APK — we don't need Play Store signing.
      # app_process loads the APK directly from the filesystem; signing is
      # irrelevant for this use-case.
      - name: Build release APK (no signing required for app_process)
        run: ./gradlew assembleRelease -x lintRelease
        continue-on-error: false

      # If Gradle produced an unsigned APK (normal when no signing config
      # is supplied), rename it to a predictable name.
      - name: Locate APK
        id: find-apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found after Gradle build" >&2
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" system_monitor.apk
          echo "apk_path=system_monitor.apk" >> "$GITHUB_OUTPUT"

      - name: Upload system_monitor.apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: system_monitor_apk
          path: system_monitor.apk
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Build adreno_ged C binary via Android NDK
  # ──────────────────────────────────────────────────────────────────────
  build-ged:
    name: Build adreno_ged (NDK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NDK r29
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true

      # ndk-build reads Android.mk and Application.mk from the working dir.
      # Output goes to libs/<abi>/adreno_ged
      - name: Build adreno_ged with ndk-build
        run: |
          ndk-build -j$(nproc) \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./Android.mk \
            NDK_APPLICATION_MK=./Application.mk \
            NDK_OUT=./obj \
            NDK_LIBS_OUT=./libs
          echo "Built binaries:"
          find libs -name "adreno_ged" -exec ls -lh {} \;

      - name: Upload GED binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: ged_binaries
          path: libs/
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Assemble the final flashable zip
  # Depends on both build jobs above.
  # ──────────────────────────────────────────────────────────────────────
  assemble-zip:
    name: Assemble Module Zip
    runs-on: ubuntu-latest
    needs: [build-sysmon, build-ged]

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Download build artifacts ──────────────────────────────────────
      - name: Download system_monitor.apk
        uses: actions/download-artifact@v4
        with:
          name: system_monitor_apk
          path: artifacts/

      - name: Download GED binaries
        uses: actions/download-artifact@v4
        with:
          name: ged_binaries
          path: artifacts/libs/

      # ── Verify downloads ──────────────────────────────────────────────
      - name: Verify artifacts
        run: |
          echo "=== system_monitor.apk ==="
          ls -lh artifacts/system_monitor.apk
          echo ""
          echo "=== GED binaries ==="
          find artifacts/libs -name "adreno_ged" -exec ls -lh {} \;

      # ── Create module layout ──────────────────────────────────────────
      - name: Assemble module directory
        run: |
          set -e
          MODULE_DIR="module_build"
          mkdir -p "$MODULE_DIR"

          # ── Version info ────────────────────────────────────────────────
          VERSION_CODE=$(git rev-list HEAD --count)
          VERSION_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TAG="${VERSION_CODE}-${SHORT_SHA}"

          echo "Version: $VERSION_NAME ($RELEASE_TAG)"

          # Patch module.prop with current version
          sed "s/versionCode=.*/versionCode=${VERSION_CODE}/" module.prop \
            | sed "s/version=.*/version=${VERSION_NAME} (${RELEASE_TAG})/" \
            > "$MODULE_DIR/module.prop"

          # ── Root module scripts ─────────────────────────────────────────
          # These run directly from $MODDIR at boot — must be at module root.
          for f in post-fs-data.sh service.sh boot-completed.sh uninstall.sh \
                   common.sh customize.sh files.sh game_exclusion_list.sh \
                   system.prop sepolicy.rule adreno_config.txt qgl_config.txt \
                   banner; do
            [ -f "$f" ] && cp "$f" "$MODULE_DIR/"
          done

          # ── META-INF for Magisk/KSU/APatch recovery flasher ────────────
          mkdir -p "$MODULE_DIR/META-INF/com/google/android"
          cat > "$MODULE_DIR/META-INF/com/google/android/update-binary" << 'UPDATEBIN'
          #!/sbin/sh
          SKIPUNZIP=1
          unzip -o "$ZIPFILE" 'customize.sh' -d "$TMPDIR"
          . "$TMPDIR/customize.sh"
          UPDATEBIN
          echo "#MAGISK" > "$MODULE_DIR/META-INF/com/google/android/updater-script"
          chmod +x "$MODULE_DIR/META-INF/com/google/android/update-binary"

          # ── system_monitor.apk ─────────────────────────────────────────
          # Placed at module root so post-fs-data.sh / service.sh find it
          # at $MODDIR/system_monitor.apk without any extra path logic.
          cp artifacts/system_monitor.apk "$MODULE_DIR/system_monitor.apk"
          echo "system_monitor.apk: $(stat -c%s "$MODULE_DIR/system_monitor.apk") bytes"

          # ── GED binaries ───────────────────────────────────────────────
          # Layout:  $MODDIR/bin/arm64-v8a/adreno_ged
          #          $MODDIR/bin/armeabi-v7a/adreno_ged
          # service.sh selects the correct ABI at runtime via ro.product.cpu.abi.
          for ABI in arm64-v8a armeabi-v7a; do
            SRC="artifacts/libs/$ABI/adreno_ged"
            if [ -f "$SRC" ]; then
              DST_DIR="$MODULE_DIR/bin/$ABI"
              mkdir -p "$DST_DIR"
              cp "$SRC" "$DST_DIR/adreno_ged"
              chmod 0755 "$DST_DIR/adreno_ged"
              echo "  Installed: bin/$ABI/adreno_ged  ($(stat -c%s "$DST_DIR/adreno_ged") bytes)"
            else
              echo "  WARNING: $SRC not found — skipping ABI $ABI"
            fi
          done

          # ── system/vendor driver libraries (placeholder dir) ───────────
          # Actual .so files are added outside CI via the module's own
          # vendor lib directories. Create the placeholder so the zip
          # structure is valid even for driver-only builds.
          mkdir -p "$MODULE_DIR/system/vendor/lib64"
          mkdir -p "$MODULE_DIR/system/vendor/lib"
          touch "$MODULE_DIR/system/vendor/lib64/.placeholder"
          touch "$MODULE_DIR/system/vendor/lib/.placeholder"

          # ── Permissions ────────────────────────────────────────────────
          chmod 0755 "$MODULE_DIR/post-fs-data.sh" \
                     "$MODULE_DIR/service.sh" \
                     "$MODULE_DIR/boot-completed.sh" \
                     "$MODULE_DIR/uninstall.sh" \
                     "$MODULE_DIR/common.sh" \
                     "$MODULE_DIR/customize.sh" \
                     "$MODULE_DIR/files.sh" \
                     "$MODULE_DIR/game_exclusion_list.sh" 2>/dev/null || true

          echo ""
          echo "=== Final module layout ==="
          find "$MODULE_DIR" -not -path "*/.git/*" | sort
          echo ""

          # ── Create flashable zip ───────────────────────────────────────
          ZIP_NAME="adreno-gpu-driver-${VERSION_NAME}-${RELEASE_TAG}.zip"
          cd "$MODULE_DIR"
          zip -r9 "../$ZIP_NAME" . \
            -x "*.placeholder" \
            -x ".git*" \
            -x "__MACOSX*" \
            -x "*.DS_Store"
          cd ..

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$ZIP_NAME"  >> "$GITHUB_ENV"

          echo ""
          echo "=== Build complete ==="
          echo "Output: $ZIP_NAME  ($(stat -c%s "$ZIP_NAME") bytes)"

      # ── Upload final zip ──────────────────────────────────────────────
      - name: Upload module zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: adreno-gpu-driver-module
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
          if-no-files-found: error

      # ── Create GitHub Release on tag push ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          body: |
            ## Adreno GPU Driver Module

            ### Game Exclusion Daemon (Encore-style architecture)
            - **Java companion** (`system_monitor.apk` via `app_process`):
              Uses `IActivityTaskManager.getFocusedRootTaskInfo()` — the same
              internal API Android uses — to get the focused app every 500ms.
            - **C daemon** (`adreno_ged`): Watches the status file via `inotify`
              (zero CPU between writes). Uses `pidfd_open` + `epoll` for instant
              process-death detection. 5s timer re-enforces `skiagl` against GOS.
            - **Why this replaces CN_PROC netlink**: No `CAP_NET_ADMIN` requirement,
              no fork-storm during boot, accurate ActivityManager-level detection.

            ### Contents
            - `system_monitor.apk`: Java companion daemon
            - `bin/arm64-v8a/adreno_ged`: C daemon (64-bit)
            - `bin/armeabi-v7a/adreno_ged`: C daemon (32-bit fallback)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
