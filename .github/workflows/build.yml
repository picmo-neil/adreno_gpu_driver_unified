name: Build and Release Module

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: boolean

# Cancel any in-progress run on the same ref so pushes don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for release creation
  actions:  read

jobs:
  build:
    name: Build Native Daemon + Package Module
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Version ─────────────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          ZIPNAME="adreno_gpu_driver_${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=${ZIPNAME}" >> "$GITHUB_OUTPUT"
          echo "Version : ${VERSION}"
          echo "Zip name: ${ZIPNAME}"

      # ── 3. Resolve latest stable non-LTS NDK ───────────────────────────────
      #
      # WHY THIS IS NON-TRIVIAL:
      #   Google maintains two NDK tracks simultaneously:
      #     • Current  — latest features, highest major number (e.g. r28b)
      #     • LTS      — older stable, longer support window (e.g. r27c LTS)
      #   The GitHub releases API returns both tracks interleaved, sorted by
      #   publish date — so r27c (LTS) can appear AFTER r28b because it was
      #   patched more recently. Simply taking .releases[0] gives you LTS, not
      #   current.
      #
      # HOW WE IDENTIFY LTS:
      #   Google marks LTS releases in the release NAME with "(LTS)" —
      #   e.g. "Android NDK r27c (LTS)". The tag itself (r27c) has no marker.
      #   We filter on .name | ascii_downcase | contains("lts") | not.
      #
      # HOW WE PICK THE HIGHEST VERSION:
      #   After excluding LTS and pre-releases we sort by:
      #     1. Major number  (r28 > r27)        — numeric descending
      #     2. Letter suffix (b > a > "")        — lexicographic descending
      #   Then take first.
      #
      # FILTERS APPLIED:
      #   • prerelease == false        — GitHub flag: rejects rc/beta/canary
      #   • tag ~ ^r[0-9]+[a-z]?$     — rejects r28-rc2, r29-beta1, r29-canary1
      #   • name !~ /lts/i             — rejects LTS track releases
      #
      # FALLBACK:
      #   If the API call fails (network issue, outage, rate-limit) or jq
      #   finds no match, the job falls back to a hardcoded minimum version
      #   and emits a ::warning:: annotation — never a hard failure.
      #
      # RATE LIMIT:
      #   Uses the built-in GITHUB_TOKEN (authenticated = 5000 req/hr).
      #   The anonymous limit is 60 req/hr which CI can trip on busy repos.
      - name: Resolve latest stable non-LTS NDK version
        id: ndk-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FALLBACK_NDK="r28b"

          echo "Querying GitHub API for NDK releases..."
          API_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/android/ndk/releases?per_page=50" \
            2>/dev/null) || true

          if [ -z "$API_RESPONSE" ]; then
            echo "::warning::GitHub API call failed — falling back to ${FALLBACK_NDK}"
            echo "ndk-version=${FALLBACK_NDK}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter + sort in jq:
          #   1. prerelease == false
          #   2. tag matches ^r[0-9]+[a-z]?$  (no hyphens → rejects rc/beta/canary)
          #   3. name does not contain "lts"   (case-insensitive → rejects LTS track)
          #   4. Sort by [major_number_desc, letter_suffix_desc]
          #   5. Take first .tag_name
          NDK_VER=$(echo "$API_RESPONSE" | jq -r '
            [ .[]
              | select(
                  .prerelease == false
                  and (.tag_name | test("^r[0-9]+[a-z]?$"))
                  and (.name | ascii_downcase | contains("lts") | not)
                )
              | .tag_name as $tag
              | ($tag | ltrimstr("r"))                           as $rest
              | ($rest | gsub("[a-z]+$"; "") | tonumber)         as $major
              | ($rest | (match("[a-z]+$").string // ""))        as $letter
              | { tag: $tag, major: $major, letter: $letter }
            ]
            | sort_by([-.major, -.letter])
            | first
            | .tag
          ' 2>/dev/null || true)

          if [ -z "$NDK_VER" ] || [ "$NDK_VER" = "null" ]; then
            echo "::warning::Could not determine NDK version from API — falling back to ${FALLBACK_NDK}"
            NDK_VER="${FALLBACK_NDK}"
          fi

          echo "ndk-version=${NDK_VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved NDK: ${NDK_VER}"

          # Emit a summary table so the resolved version is visible at a glance
          echo "### NDK Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |"             >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"         >> "$GITHUB_STEP_SUMMARY"
          echo "| Resolved | \`${NDK_VER}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fallback | \`${FALLBACK_NDK}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ── 4. Cache NDK ───────────────────────────────────────────────────────
      # NDK tarballs are ~700 MB — caching saves ~2 min per run.
      # Cache key includes the resolved version so upgrading to a new NDK
      # automatically busts the cache without any manual intervention.
      - name: Cache NDK ${{ steps.ndk-version.outputs.ndk-version }}
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/ndk/${{ steps.ndk-version.outputs.ndk-version }}
          key: ndk-${{ steps.ndk-version.outputs.ndk-version }}-${{ runner.os }}

      # ── 5. Install NDK ─────────────────────────────────────────────────────
      - name: Set up Android NDK ${{ steps.ndk-version.outputs.ndk-version }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ steps.ndk-version.outputs.ndk-version }}
          add-to-path: true
          local-cache: true

      # ── 6. Verify NDK toolchain ────────────────────────────────────────────
      - name: Verify NDK toolchain
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          CLANG="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          echo "NDK path : ${NDK}"
          echo "NDK ver  : ${{ steps.ndk-version.outputs.ndk-version }}"
          "${NDK}/ndk-build" --version
          echo "Clang    : $(${CLANG} --version | head -1)"

      # ── 7. Build adreno_ged (arm64-v8a + armeabi-v7a) ─────────────────────
      # Repo layout:
      #   jni/Android.mk
      #   jni/Application.mk
      #   jni/src/ged.c
      #
      # Outputs:
      #   build/libs/arm64-v8a/adreno_ged
      #   build/libs/armeabi-v7a/adreno_ged
      - name: Build adreno_ged
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"

          "${NDK}/ndk-build"           \
            NDK_PROJECT_PATH=.         \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            NDK_OUT=build/obj          \
            NDK_LIBS_OUT=build/libs    \
            -j$(nproc)

          echo "=== Built binaries ==="
          find build/libs -type f -name "adreno_ged" -exec ls -lh {} \;

      # ── 8. Strip + verify binaries ─────────────────────────────────────────
      # llvm-strip removes debug symbols (~40-60% size reduction).
      # file(1) confirms correct ELF architecture per ABI — catches a silent
      # cross-compile failure before the binary reaches a device.
      - name: Strip and verify binaries
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          FAILED=0
          for abi in arm64-v8a armeabi-v7a; do
            bin="build/libs/${abi}/adreno_ged"

            if [ ! -f "$bin" ]; then
              echo "::error::Missing binary: ${bin}"
              FAILED=1
              continue
            fi

            "${STRIP}" --strip-unneeded "$bin" 2>/dev/null || true

            FILE_OUT="$(file "$bin")"
            SIZE=$(stat -c%s "$bin")
            echo "=== ${abi} ==="
            echo "  Size : ${SIZE} bytes"
            echo "  file : ${FILE_OUT}"

            case "$abi" in
              arm64-v8a)
                echo "$FILE_OUT" | grep -qi "aarch64\|arm64\|ARM aarch64" || {
                  echo "::error::${abi} binary is not AArch64: ${FILE_OUT}"
                  FAILED=1
                }
                ;;
              armeabi-v7a)
                echo "$FILE_OUT" | grep -qi "ARM,\|32-bit\|EABI" || {
                  echo "::error::${abi} binary is not 32-bit ARM: ${FILE_OUT}"
                  FAILED=1
                }
                ;;
            esac

            if [ "$SIZE" -lt 1024 ]; then
              echo "::error::${abi} binary suspiciously small (${SIZE} bytes) — link may have failed"
              FAILED=1
            fi
            if [ "$SIZE" -gt 5242880 ]; then
              echo "::warning::${abi} binary is large (${SIZE} bytes) — debug symbols still present?"
            fi
          done

          [ "$FAILED" -eq 0 ] || exit 1
          echo "All binaries verified OK"

      # ── 9. Assemble staging directory ──────────────────────────────────────
      #
      # The staging directory IS the module zip layout. We copy everything
      # into staging/ then:
      #   a) zip staging/ → module zip for the GitHub Release asset
      #   b) upload staging/ directly as the workflow artifact
      #
      # Uploading the directory (not the pre-built zip) avoids the double-zip
      # problem: upload-artifact wraps whatever path you give it — if you
      # give it a .zip it produces artifact.zip → module.zip (nested).
      # Giving it a directory means the downloaded artifact IS the module zip.
      - name: Assemble staging directory
        id: assemble
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="${{ steps.version.outputs.zipname }}"
          NDK_VER="${{ steps.ndk-version.outputs.ndk-version }}"
          S="staging"

          # ── Scaffold ───────────────────────────────────────────────────────
          mkdir -p "${S}/META-INF/com/google/android"
          mkdir -p "${S}/bin/arm64-v8a"
          mkdir -p "${S}/bin/armeabi-v7a"

          # ── META-INF ───────────────────────────────────────────────────────
          if [ ! -f "META-INF/com/google/android/update-binary" ]; then
            echo "::error::META-INF/com/google/android/update-binary not found in repo"
            exit 1
          fi
          cp "META-INF/com/google/android/update-binary" \
             "${S}/META-INF/com/google/android/update-binary"
          echo "  + update-binary ($(wc -c < META-INF/com/google/android/update-binary) bytes)"

          if [ -f "META-INF/com/google/android/updater-script" ]; then
            cp "META-INF/com/google/android/updater-script" \
               "${S}/META-INF/com/google/android/updater-script"
          else
            echo "#MAGISK" > "${S}/META-INF/com/google/android/updater-script"
          fi

          # ── Required root files (hard fail if missing) ─────────────────────
          for f in module.prop customize.sh; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing from repo: ${f}"
              exit 1
            fi
          done

          # ── Optional root files ────────────────────────────────────────────
          for f in \
            module.prop system.prop \
            customize.sh post-fs-data.sh service.sh uninstall.sh \
            common.sh game_excl_daemon.sh game_exclusion_list.sh \
            adreno_config.txt qgl_config.txt sepolicy.rule \
            files.sh action.sh banner; do
            [ -f "$f" ] && cp "$f" "${S}/" && echo "  + $f"
          done

          # Root image/asset files (banner.webp, icons, etc.)
          shopt -s nullglob
          for f in *.webp *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            cp "$f" "${S}/" && echo "  + $f"
          done
          shopt -u nullglob

          # ── Directories ────────────────────────────────────────────────────
          if [ -d "system" ]; then
            cp -r system "${S}/system"
            echo "  + system/ ($(find system -type f | wc -l) files)"
          else
            echo "::warning::system/ not found in repo — driver .so files will be missing"
          fi

          for dir in webroot Documentation common; do
            if [ -d "$dir" ]; then
              cp -r "$dir" "${S}/${dir}"
              echo "  + ${dir}/ ($(find "$dir" -type f | wc -l) files)"
            fi
          done

          # ── Native daemon binaries ─────────────────────────────────────────
          for abi in arm64-v8a armeabi-v7a; do
            src="build/libs/${abi}/adreno_ged"
            dst="${S}/bin/${abi}/adreno_ged"
            cp "$src" "$dst"
            chmod 0755 "$dst"
            echo "  + bin/${abi}/adreno_ged ($(ls -lh "$src" | awk '{print $5}'))"
          done

          # ── Staging manifest ───────────────────────────────────────────────
          echo ""
          echo "=== Staging contents ==="
          find "${S}" -type f | sort | sed "s|^${S}/|  |"
          echo ""
          echo "Total files: $(find "${S}" -type f | wc -l)"

          # ── Build release zip (for GitHub Release asset only) ──────────────
          (cd "${S}" && zip -r9 "../${ZIPNAME}" . \
            --exclude "*/.DS_Store" \
            --exclude "*/__MACOSX*")

          echo ""
          echo "=== Release zip ==="
          ls -lh "${ZIPNAME}"
          unzip -l "${ZIPNAME}"

          echo "zippath=./${ZIPNAME}" >> "$GITHUB_OUTPUT"

          # Job summary
          echo "### Build Summary"                               >> "$GITHUB_STEP_SUMMARY"
          echo "| | |"                                           >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"                                        >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |"                   >> "$GITHUB_STEP_SUMMARY"
          echo "| NDK | \`${NDK_VER}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Zip | \`${ZIPNAME}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | $(find "${S}" -type f | wc -l) |"     >> "$GITHUB_STEP_SUMMARY"

      # ── 10. Upload artifact ────────────────────────────────────────────────
      #
      # path: staging/  →  GitHub zips the directory contents directly.
      # Downloaded artifact: adreno-gpu-driver-<ver>.zip → module files at root.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adreno-gpu-driver-${{ steps.version.outputs.version }}
          path: staging/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      # ── 11. GitHub Release (version tags + manual trigger only) ───────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Adreno GPU Driver ${{ steps.version.outputs.version }}"
          body: |
            ## Adreno GPU Driver ${{ steps.version.outputs.version }}

            Flash via Magisk / KernelSU / APatch.

            ### Native game exclusion daemon
            Zero-overhead C binary replaces the shell `game_excl_daemon.sh`.
            Shell fallback is still included and used automatically if the binary can't run.

            | Mechanism | Purpose | CPU when idle |
            |---|---|---|
            | Netlink PROC_EVENT_FORK | Detect zygote fork | Zero |
            | Netlink PROC_EVENT_COMM | Confirm app identity | Zero |
            | pidfd + epoll | Instant game-exit detection | Zero |
            | PROC_EVENT_EXIT | Exit backup signal | Zero |

            Built with NDK `${{ steps.ndk-version.outputs.ndk-version }}` · `${{ github.sha }}`
          files: ${{ steps.assemble.outputs.zippath }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
