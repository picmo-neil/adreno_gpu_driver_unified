name: Build and Release Module

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
    paths:
      - '.github/workflows/build.yml'
      - 'post-fs-data.sh'
      - 'service.sh'
      - 'boot-completed.sh'
      - 'uninstall.sh'
      - 'common.sh'
      - 'customize.sh'
      - 'files.sh'
      - 'system.prop'
      - 'sepolicy.rule'
      - 'module.prop'
      - 'adreno_config.txt'
      - 'qgl_config.txt'
      - 'qgl_profiles.json'
      - 'apply_qgl.sh'
      - 'QGLTrigger/**'
      - 'AGENTS.md'
      - '.context/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: boolean

# FIX: was 'group: build' — global lock broke concurrent branch builds.
# Per-ref group means only one run per branch/tag at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# FIX: was missing entirely — 'contents: write' is required for Release creation.
permissions:
  contents: write
  actions:  read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build QGL Trigger APK
  # ────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build QGL Trigger APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
          cache-read-only: false

      - name: Generate Gradle Wrapper
        run: |
          cd QGLTrigger
          # gradle is now available (installed by setup-gradle via gradle-version input)
          gradle wrapper --no-daemon

      - name: Ensure debug keystore exists
        run: |
          cd QGLTrigger
          if [ ! -f "app/debug.keystore" ]; then
            echo "Creating debug keystore..."
            keytool -genkeypair -v -keystore app/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" 2>&1 || true
          fi

      - name: Build APK
        id: build
        run: |
          cd QGLTrigger
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 || {
            echo "::warning::APK build failed — module will be packaged without QGL Trigger APK"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        if: steps.build.outputs.success == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: qgl-trigger-apk
          path: QGLTrigger/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Copy APK to staging
        if: steps.build.outputs.success == 'true'
        run: |
          mkdir -p staging
          cp QGLTrigger/app/build/outputs/apk/release/*.apk staging/QGLTrigger.apk 2>/dev/null && \
            echo "APK copied to staging/" || \
            echo "::warning::No APK found — QGL Trigger APK will not be included in module zip"

      - name: Upload staging APK
        if: steps.build.outputs.success == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: staging-apk
          path: staging/QGLTrigger.apk
          retention-days: 30
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Assemble final flashable zip
  # ────────────────────────────────────────────────────────────────────────────
  assemble:
    name: Assemble Module Zip
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Download APK from build job
      - name: Download QGL Trigger APK
        uses: actions/download-artifact@v5
        with:
          name: staging-apk
          path: apk-staging
        continue-on-error: true

      - name: Copy APK to repo root
        run: |
          if [ -f "apk-staging/QGLTrigger.apk" ]; then
            cp apk-staging/QGLTrigger.apk ./QGLTrigger.apk
            echo "QGLTrigger.apk copied to repo root"
          else
            echo "::warning::QGLTrigger.apk not available — module will not include the APK"
          fi

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          ZIPNAME="adreno_gpu_driver_${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=${ZIPNAME}" >> "$GITHUB_OUTPUT"
          echo "Version : ${VERSION}"
          echo "Zip name: ${ZIPNAME}"

      # ── Assemble staging directory ──────────────────────────────────────────
      #
      # The staging directory IS the module zip layout. We zip staging/ for the
      # GitHub Release asset and also upload staging/ as the workflow artifact
      # (avoids the double-zip problem: upload-artifact wraps a directory into
      # one zip, wrapping a pre-built .zip would produce a nested zip).
      - name: Assemble staging directory
        id: assemble
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="${{ steps.version.outputs.zipname }}"
          S="staging"

          # ── Scaffold ─────────────────────────────────────────────────────────
          mkdir -p "${S}/META-INF/com/google/android"

          # ── META-INF ─────────────────────────────────────────────────────────
          # FIX: new build.yml was generating a 4-line stub here, completely
          # discarding the real 47 KB update-binary installer from the repo.
          if [ ! -f "META-INF/com/google/android/update-binary" ]; then
            echo "::error::META-INF/com/google/android/update-binary not found in repo"
            exit 1
          fi
          cp "META-INF/com/google/android/update-binary" \
             "${S}/META-INF/com/google/android/update-binary"
          echo "  + update-binary ($(wc -c < META-INF/com/google/android/update-binary) bytes)"

          if [ -f "META-INF/com/google/android/updater-script" ]; then
            cp "META-INF/com/google/android/updater-script" \
               "${S}/META-INF/com/google/android/updater-script"
          else
            echo "#MAGISK" > "${S}/META-INF/com/google/android/updater-script"
          fi

          # ── Required root files (hard fail if missing) ──────────────────────
          for f in module.prop customize.sh; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing from repo: ${f}"
              exit 1
            fi
          done

          # ── Module shell scripts and config files ────────────────────────────
          for f in \
            module.prop system.prop \
            customize.sh post-fs-data.sh service.sh uninstall.sh \
            boot-completed.sh apply_qgl.sh \
            common.sh \
            adreno_config.txt qgl_config.txt qgl_profiles.json sepolicy.rule \
            files.sh banner AGENTS.md; do
            [ -f "$f" ] && cp "$f" "${S}/" && echo "  + $f"
          done

          # ── QGL Trigger APK (optional) ───────────────────────────────────────
          if [ -f "QGLTrigger.apk" ]; then
            cp QGLTrigger.apk "${S}/QGLTrigger.apk"
            echo "  + QGLTrigger.apk ($(du -h QGLTrigger.apk | cut -f1))"
          else
            echo "  ! QGLTrigger.apk — NOT INCLUDED (APK build failed or not triggered)"
          fi

          # Update version in module.prop inside staging
          VERSION_CODE=$(date +%y%m%d)
          sed -i "s/^version=.*/version=${VERSION}/" "${S}/module.prop"
          sed -i "s/^versionCode=.*/versionCode=${VERSION_CODE}/" "${S}/module.prop"
          echo "  + module.prop version updated to ${VERSION} (${VERSION_CODE})"

          # Root image/asset files
          shopt -s nullglob
          for f in *.webp *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            cp "$f" "${S}/" && echo "  + $f"
          done
          shopt -u nullglob

          # ── system/ empty scaffold ───────────────────────────────────────────
          # The repo has no system/ dir — driver .so files are added by the user
          # after flashing. We create the exact empty folder tree here so the zip
          # has the correct structure and Magisk/KSU magic-mount can see the paths.
          # A .gitkeep is placed in every leaf so zip -r doesn't silently drop them.
          for d in \
            system/lib \
            system/lib64 \
            system/vendor/etc/permissions \
            system/vendor/firmware \
            system/vendor/gpu/kbc \
            system/vendor/lib/egl \
            system/vendor/lib/hw \
            system/vendor/lib64/egl \
            system/vendor/lib64/hw; do
            mkdir -p "${S}/${d}"
            touch "${S}/${d}/.gitkeep"
          done
          echo "  + system/ scaffold (empty, $(find "${S}/system" -type d | wc -l) dirs)"

          for dir in webroot Documentation .context; do
            if [ -d "$dir" ]; then
              cp -r "$dir" "${S}/${dir}"
              echo "  + ${dir}/ ($(find "$dir" -type f | wc -l) files)"
            fi
          done

          # ── Staging manifest ─────────────────────────────────────────────────
          echo ""
          echo "=== Staging contents ==="
          find "${S}" -type f | sort | sed "s|^${S}/|  |"
          echo ""
          echo "Total files: $(find "${S}" -type f | wc -l)"

          # ── Build release zip (for GitHub Release asset only) ────────────────
          # NOTE: .gitkeep files are intentionally NOT excluded.
          # Each system/ leaf dir contains exactly one .gitkeep (0 bytes).
          # Excluding them would leave empty dirs that zip drops silently on
          # some versions of info-zip (glob "*/.gitkeep" only matches one
          # level deep — nested paths like system/vendor/lib/egl/.gitkeep are
          # silently unmatched, so behaviour was inconsistent).
          # .gitkeep files are harmless during flashing: Magisk/KSU magic-mount
          # ignores them, and the user's driver .so files go in the same dirs.
          (cd "${S}" && zip -r9 "../${ZIPNAME}" . \
            --exclude "*/.DS_Store" \
            --exclude "*/__MACOSX*")

          echo ""
          echo "=== Release zip ==="
          ls -lh "${ZIPNAME}"
          unzip -l "${ZIPNAME}"

          echo "zippath=./${ZIPNAME}" >> "$GITHUB_OUTPUT"

          # Job summary
          echo "### Build Summary"                               >> "$GITHUB_STEP_SUMMARY"
          echo "| | |"                                           >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"                                        >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |"                   >> "$GITHUB_STEP_SUMMARY"
          echo "| Zip | \`${ZIPNAME}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | $(find "${S}" -type f | wc -l) |"     >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: adreno-gpu-driver-${{ steps.version.outputs.version }}
          path: staging/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      # FIX: startsWith(github.ref, 'refs/tags/') can now actually fire because
      # the tag trigger (tags: ['v*.*.*']) is restored in the on: block above.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Adreno GPU Driver ${{ steps.version.outputs.version }}"
          body: |
            ## Adreno GPU Driver ${{ steps.version.outputs.version }}

            Flash via Magisk / KernelSU / APatch.

            `${{ github.sha }}`
          files: ${{ steps.assemble.outputs.zippath }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
