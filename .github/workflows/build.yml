name: Build and Release Module

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build Native Daemon + Package Module
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Version ─────────────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      # ── 3. NDK ─────────────────────────────────────────────────────────────
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      # ── 4. Build ───────────────────────────────────────────────────────────
      # Repo layout:
      #   jni/Android.mk
      #   jni/Application.mk
      #   jni/src/ged.c
      #
      # ndk-build is called from the repo root (NDK_PROJECT_PATH=.)
      # Binaries output to:
      #   build/libs/arm64-v8a/adreno_ged
      #   build/libs/armeabi-v7a/adreno_ged
      - name: Build adreno_ged (arm64-v8a + armeabi-v7a)
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          echo "NDK: ${NDK_PATH}"

          "${NDK_PATH}/ndk-build" \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            NDK_OUT=build/obj \
            NDK_LIBS_OUT=build/libs \
            -j$(nproc)

          echo "=== Built binaries ==="
          find build/libs -type f -name "adreno_ged" -exec ls -lh {} \;

      # ── 5. Verify binaries ─────────────────────────────────────────────────
      - name: Verify binaries
        run: |
          for abi in arm64-v8a armeabi-v7a; do
            bin="build/libs/${abi}/adreno_ged"
            if [ ! -f "$bin" ]; then
              echo "ERROR: missing $bin"; exit 1
            fi
            echo "=== ${abi} ==="
            file "$bin"
            ls -lh "$bin"
          done

      # ── 6. Assemble module zip ─────────────────────────────────────────────
      #
      # IMPORTANT — update-binary:
      #   The real META-INF/com/google/android/update-binary (~40KB Magisk
      #   installer) is taken DIRECTLY from the repo checkout. We never
      #   generate or stub it — that would produce a broken few-byte file.
      #
      # Final zip layout mirrors the repo exactly, with two additions:
      #   bin/arm64-v8a/adreno_ged    ← compiled native daemon
      #   bin/armeabi-v7a/adreno_ged
      - name: Assemble module zip
        id: assemble
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPNAME="adreno_gpu_driver_${VERSION}.zip"
          S="staging"

          # ── Scaffold staging dirs ─────────────────────────────────────────
          mkdir -p "${S}/META-INF/com/google/android"
          mkdir -p "${S}/bin/arm64-v8a"
          mkdir -p "${S}/bin/armeabi-v7a"

          # ── META-INF: copy the REAL update-binary from the repo ───────────
          # FIX: previously used a heredoc stub which produced a ~60-byte file.
          # The real update-binary is the full Magisk module_installer.sh (~40KB).
          # It MUST come from the repo — never regenerated here.
          if [ -f "META-INF/com/google/android/update-binary" ]; then
            cp "META-INF/com/google/android/update-binary" \
               "${S}/META-INF/com/google/android/update-binary"
            echo "  + META-INF/com/google/android/update-binary ($(wc -c < META-INF/com/google/android/update-binary) bytes)"
          else
            echo "ERROR: META-INF/com/google/android/update-binary not found in repo!"
            exit 1
          fi
          if [ -f "META-INF/com/google/android/updater-script" ]; then
            cp "META-INF/com/google/android/updater-script" \
               "${S}/META-INF/com/google/android/updater-script"
          else
            echo "#MAGISK" > "${S}/META-INF/com/google/android/updater-script"
          fi

          # ── Root-level files ──────────────────────────────────────────────
          # Explicit list of known script/config files
          for f in \
            module.prop system.prop \
            customize.sh post-fs-data.sh service.sh uninstall.sh \
            common.sh game_excl_daemon.sh game_exclusion_list.sh \
            adreno_config.txt qgl_config.txt sepolicy.rule files.sh \
            action.sh banner; do
            [ -f "$f" ] && cp "$f" "${S}/" && echo "  + $f"
          done

          # All image/asset files at root (banner.webp, *.png, etc.)
          # The nullglob trick avoids literal '*.webp' if no match exists
          shopt -s nullglob
          for f in *.webp *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            cp "$f" "${S}/" && echo "  + $f"
          done
          shopt -u nullglob

          # ── Directories ───────────────────────────────────────────────────
          # FIX: system/ and webroot/ were not being copied on some runs
          # because the glob check was silently skipping them.
          # Using explicit rsync-style copy with error on missing critical dirs.
          if [ -d "system" ]; then
            cp -r system "${S}/system"
            echo "  + system/ ($(find system -type f | wc -l) files)"
          else
            echo "WARNING: system/ directory not found in repo"
          fi

          [ -d "webroot"       ] && cp -r webroot       "${S}/webroot"       && echo "  + webroot/"
          [ -d "Documentation" ] && cp -r Documentation "${S}/Documentation" && echo "  + Documentation/"
          [ -d "common"        ] && cp -r common        "${S}/common"        && echo "  + common/"

          # ── Native daemon binaries ────────────────────────────────────────
          cp "build/libs/arm64-v8a/adreno_ged"   "${S}/bin/arm64-v8a/adreno_ged"
          cp "build/libs/armeabi-v7a/adreno_ged" "${S}/bin/armeabi-v7a/adreno_ged"
          chmod 0755 "${S}/bin/arm64-v8a/adreno_ged"
          chmod 0755 "${S}/bin/armeabi-v7a/adreno_ged"
          echo "  + bin/arm64-v8a/adreno_ged  ($(ls -lh build/libs/arm64-v8a/adreno_ged | awk '{print $5}'))"
          echo "  + bin/armeabi-v7a/adreno_ged ($(ls -lh build/libs/armeabi-v7a/adreno_ged | awk '{print $5}'))"

          # ── Create zip ────────────────────────────────────────────────────
          cd "${S}"
          zip -r9 "../${ZIPNAME}" . \
            --exclude "*/.DS_Store" \
            --exclude "*/__MACOSX*"
          cd ..

          echo "zipname=${ZIPNAME}" >> "$GITHUB_OUTPUT"
          echo "zippath=./${ZIPNAME}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Final zip ==="
          ls -lh "${ZIPNAME}"
          echo ""
          echo "=== Contents ==="
          unzip -l "${ZIPNAME}"

      # ── 7. Upload artifact (every run) ─────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adreno-gpu-driver-${{ steps.version.outputs.version }}
          path: ${{ steps.assemble.outputs.zippath }}
          retention-days: 30

      # ── 8. GitHub Release (version tags + manual trigger only) ─────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Adreno GPU Driver ${{ steps.version.outputs.version }}"
          body: |
            ## Adreno GPU Driver ${{ steps.version.outputs.version }}

            Flash via Magisk / KernelSU / APatch.

            ### Native game exclusion daemon
            Zero-overhead C binary replaces the shell `game_excl_daemon.sh`.
            Shell fallback is still included and used automatically if the binary can't run.

            | Mechanism | Purpose | CPU when idle |
            |---|---|---|
            | Netlink PROC_EVENT_FORK | Detect zygote fork | Zero |
            | Netlink PROC_EVENT_COMM | Confirm app identity | Zero |
            | pidfd + epoll | Instant game-exit detection | Zero |
            | PROC_EVENT_EXIT | Exit backup signal | Zero |

            Built with NDK r27c · `${{ github.sha }}`
          files: ${{ steps.assemble.outputs.zippath }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
